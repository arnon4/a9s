name: E2E

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Zig Compiler
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Run Unit Tests
        run: zig build test

      - name: Build Project
        run: zig build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Run e2e tests
        working-directory: e2e
        run: npx @microsoft/tui-test
