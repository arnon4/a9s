name: E2E

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        shard: [1, 2, 3]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      TOTAL_SHARDS: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Zig Compiler
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Run Unit Tests
        run: zig build test

      - name: Build Project
        run: zig build

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Select shard's test files
        id: files
        working-directory: e2e
        run: |
          FILES=$(ls tests/*.test.js | sort | awk -v n="$TOTAL_SHARDS" -v s="${{ matrix.shard }}" 'NR % n == (s % n)' | tr '\n' ' ')
          echo "$FILES"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run e2e tests (shard ${{ matrix.shard }}/3)
        id: e2e
        working-directory: e2e
        run: |
          set +e
          npx @microsoft/tui-test ${{ steps.files.outputs.files }} 2>&1 \
            | sed 's/\x1b\[[0-9;]*m//g' | tee test-output.log
          STATUS=${PIPESTATUS[0]}
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Summarize failures
        if: always() && steps.e2e.outputs.status != '0'
        working-directory: e2e
        run: |
          {
            echo "### e2e failures — shard ${{ matrix.shard }}/3 (${{ matrix.os }})"
            echo
            awk '
              /^  [0-9]+\) /{
                match($0, /^  [0-9]+\) /)
                title = substr($0, RLENGTH+1)
                getline
                getline
                while ($0 ~ /^[[:space:]]*$/) getline
                err = $0
                sub(/^[[:space:]]*/, "", err)
                printf "- **%s** — %s\n", title, err
              }
            ' test-output.log
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if e2e tests failed
        if: steps.e2e.outputs.status != '0'
        run: exit 1
