name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  run:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Setup Zig Compiler
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run Unit Tests
        run: zig build test

      - name: Build Project
        run: zig build

      - name: Configure AWS Credentials
        uses:
